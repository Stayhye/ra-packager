name: CI

on:
  push:
    branches: 
      - '*'
    tags:
      - v*
  pull_request:
  repository_dispatch:
    types: [run_build]
  workflow_dispatch: {}

jobs:
  cores:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
        core_opts: [
          [libretro-prboom, prboom_libretro_ps2],
          [gambatte-libretro, gambatte_libretro_ps2],
        ]
      fail-fast: false

    container: ${{ matrix.docker_owner }}/ps2dev:latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk add build-base git bash cmake

    - name: Compile custom ps2_driver
      run: |
        git clone --recurse-submodules https://github.com/fjtrujy/ps2_drivers.git
        cd ps2_drivers
        for dir in $(find . -maxdepth 2 -name Makefile); do
          echo "Building in $(dirname $dir)..."
          make -C $(dirname $dir) install
        done

    - name: Patch ps2_gfx for GSkit Compatibility
      run: |
        # Search the entire workspace for ps2_gfx.c or .cpp
        TARGET_FILE=$(find . -name "ps2_gfx.c" -o -name "ps2_gfx.cpp" | head -n 1)
        
        if [ -n "$TARGET_FILE" ] && [ -f "$TARGET_FILE" ]; then
          echo "Found $TARGET_FILE, applying vsync_handler signature patch..."
          # Broadened regex to catch 'int vsync_handler(void)' with any spacing
          sed -i 's/int\s*vsync_handler\s*(\s*void\s*)/int vsync_handler(int cause)/g' "$TARGET_FILE"
          
          # Verification check
          if grep -q "vsync_handler(int cause)" "$TARGET_FILE"; then
            echo "Patch applied successfully to $TARGET_FILE"
          else
            echo "Patch failed to apply! Check file content."
            exit 1
          fi
        else
          echo "Error: ps2_gfx file not found anywhere in the repository."
          # List files to help debug if it fails again
          find . -maxdepth 3 -not -path '*/.*'
          exit 1
        fi

    - name: Compile project
      run: |
        chmod +x *.sh
        chmod +x cores/*.sh
        ./prepare_release.sh
        ./prepare_retroarch.sh
        ./cores/${{ matrix.core_opts[0] }}.sh
        ./generate_retroarch.sh ${{ matrix.core_opts[0] }} ${{ matrix.core_opts[1] }}

    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: RA-${{ matrix.core_opts[0] }}-${{ steps.slug.outputs.sha8 }}
        path: RA/

  libretro-salamander:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
      fail-fast: false

    container: ${{ matrix.docker_owner }}/ps2dev:latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk add build-base git bash cmake

    - name: Compile custom ps2_driver
      run: |
        git clone https://github.com/fjtrujy/ps2_drivers.git
        cd ps2_drivers
        for dir in $(find . -maxdepth 2 -name Makefile); do
          make -C $(dirname $dir) install
        done
    
    - name: Compile project
      run: |
        chmod +x *.sh
        ./prepare_release.sh
        
    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: RA-salamander-${{ steps.slug.outputs.sha8 }}
        path: RA/

  libretro-info-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]

    steps:
    - uses: actions/checkout@v4

    - name: Compile project
      run: |
        chmod +x *.sh
        ./prepare_release.sh
        
    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: RA-info-${{ steps.slug.outputs.sha8 }}
        path: RA/
