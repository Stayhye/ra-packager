name: CI

on:
  push:
    branches: 
      - '*'
    tags:
      - v*
  pull_request:
  repository_dispatch:
    types: [run_build]
  workflow_dispatch: {}

jobs:
  cores:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
        core_opts: [
          [libretro-prboom, prboom_libretro_ps2],
          [gambatte-libretro, gambatte_libretro_ps2],
        ]
      fail-fast: false

    container: ${{ matrix.docker_owner }}/ps2dev:latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk add build-base git bash cmake

    - name: Compile custom ps2_driver
      run: |
        git clone --recurse-submodules https://github.com/fjtrujy/ps2_drivers.git
        cd ps2_drivers
        for dir in $(find . -maxdepth 2 -name Makefile); do
          make -C $(dirname $dir) install
        done

    - name: Prepare and Force Patch
      run: |
        chmod +x *.sh
        chmod +x cores/*.sh
        
        # 1. Run preparation scripts
        ./prepare_release.sh
        ./prepare_retroarch.sh
        
        # 2. Find and patch EVERY instance of ps2_gfx.c in the entire workspace
        # This ensures that even if it's in a subfolder like 'retroarch-src', we hit it.
        echo "Searching for ps2_gfx.c..."
        find . -name "ps2_gfx.c" -not -path "./ps2_drivers/*" | while read -r file; do
          echo "Patching: $file"
          # Use a nuclear regex that replaces 'vsync_handler' regardless of 'static' or 'int'
          sed -i -E 's/vsync_handler\s*\([^)]*\)/vsync_handler(int cause)/g' "$file"
          echo "Verified content for $file:"
          grep "vsync_handler" "$file"
        done

    - name: Compile project
      run: |
        # We run the patch AGAIN right before the core script, 
        # just in case the core script does its own clean/reset.
        find . -name "ps2_gfx.c" -not -path "./ps2_drivers/*" -exec sed -i -E 's/vsync_handler\s*\([^)]*\)/vsync_handler(int cause)/g' {} +
        
        ./cores/${{ matrix.core_opts[0] }}.sh
        ./generate_retroarch.sh ${{ matrix.core_opts[0] }} ${{ matrix.core_opts[1] }}

    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: RA-${{ matrix.core_opts[0] }}-${{ steps.slug.outputs.sha8 }}
        path: RA/
