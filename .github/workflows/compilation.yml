name: CI

on:
  push:
    branches: 
      - '*'
    tags:
      - v*
  pull_request:
  repository_dispatch:
    types: [run_build]
  workflow_dispatch: {}

jobs:
  cores:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
        core_opts: [
          [libretro-prboom, prboom_libretro_ps2],
          [gambatte-libretro, gambatte_libretro_ps2],
          [mame2003-plus, mame2003_plus_libretro_ps2],
        ]
      fail-fast: false

    container: ${{ matrix.docker_owner }}/ps2dev:latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk add build-base git bash cmake

    - name: Compile custom ps2_driver
      run: |
        # Ensure toolchain is in path for driver compilation
        export PS2DEV=/usr/local/ps2dev
        export PS2SDK=$PS2DEV/ps2sdk
        export PATH=$PATH:$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PS2SDK/bin

        git clone --recurse-submodules https://github.com/fjtrujy/ps2_drivers.git
        cd ps2_drivers
        for dir in $(find . -maxdepth 2 -name Makefile); do
          make -C $(dirname $dir) install
        done

    - name: Prepare and Surgical Patch
      run: |
        chmod +x *.sh
        chmod +x cores/*.sh
        
        ./prepare_release.sh
        ./prepare_retroarch.sh
        
        # Patch RetroArch common graphics for modern PS2SDK compatibility
        find . -name "ps2_gfx.c" -not -path "./ps2_drivers/*" | while read -r file; do
          sed -i -E 's/int\s+vsync_handler\s*\((void)?\)/int vsync_handler(int cause)/g' "$file"
        done

    - name: Compile project
      run: |
        # 1. Force the system to recognize ee-gcc globally via Symlinks
        # This creates a shortcut so 'ee-gcc' points directly to the real file
        echo "Creating toolchain symlinks..."
        ln -sf /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-gcc /usr/local/bin/ee-gcc
        ln -sf /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-g++ /usr/local/bin/ee-g++
        ln -sf /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-ar /usr/local/bin/ee-ar
        ln -sf /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-strip /usr/local/bin/ee-strip

        # 2. Setup the Environment
        export PS2DEV=/usr/local/ps2dev
        export PS2SDK=$PS2DEV/ps2sdk
        export PATH=$PATH:$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PS2SDK/bin
        
        CORE_DIR="cores/${{ matrix.core_opts[0] }}-libretro"
        
        if [ "${{ matrix.core_opts[0] }}" == "mame2003-plus" ]; then
          # Ensure we are in a clean state
          rm -rf $CORE_DIR
          git clone --depth 1 https://github.com/libretro/mame2003-plus-libretro $CORE_DIR
          
          echo "Force-injecting paths to the TOP of MAME Makefile..."
          # This inserts these lines at line 1 of the Makefile, so they cannot be overridden easily
          sed -i '1i CC = /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-gcc' $CORE_DIR/Makefile
          sed -i '1i CXX = /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-g++' $CORE_DIR/Makefile
          sed -i '1i AR = /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-ar' $CORE_DIR/Makefile
          sed -i '1i CROSS_COMPILE = /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-' $CORE_DIR/Makefile
        fi

        # 3. Execution with explicit Pathing
        # We pass the absolute path to CC/CXX directly to the bash script
        ./cores/${{ matrix.core_opts[0] }}.sh \
          platform=ps2 \
          CC=/usr/local/bin/ee-gcc \
          CXX=/usr/local/bin/ee-g++ \
          AR=/usr/local/bin/ee-ar

    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: RA-${{ matrix.core_opts[0] }}-${{ steps.slug.outputs.sha8 }}
        path: RA/
