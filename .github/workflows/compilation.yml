name: CI

on:
  push:
    branches: 
      - '*'
    tags:
      - v*
  pull_request:
  repository_dispatch:
    types: [run_build]
  workflow_dispatch: {}

jobs:
  cores:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
        core_opts: [
          [libretro-prboom, prboom_libretro_ps2],
          [gambatte-libretro, gambatte_libretro_ps2],
        ]
      fail-fast: false

    container: ${{ matrix.docker_owner }}/ps2dev:latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk add build-base git bash cmake

    - name: Compile custom ps2_driver
      run: |
        git clone --recurse-submodules https://github.com/fjtrujy/ps2_drivers.git
        cd ps2_drivers
        for dir in $(find . -maxdepth 2 -name Makefile); do
          make -C $(dirname $dir) install
        done

    - name: Prepare and Surgical Patch
      run: |
        chmod +x *.sh
        chmod +x cores/*.sh
        
        # 1. Run preparation scripts
        ./prepare_release.sh
        ./prepare_retroarch.sh
        
        # 2. Fix the GSkit vsync_handler signature
        echo "Applying GSkit patch..."
        find . -name "ps2_gfx.c" -not -path "./ps2_drivers/*" -exec sed -i -E 's/int\s+vsync_handler\s*\((void)?\)/int vsync_handler(int cause)/g' {} +
        
        # 3. Fix the ps2_filesystem_driver const char pointer mismatch
        # We find where waitUntilDeviceIsReady is called and cast the argument to (char *)
        echo "Applying Filesystem Driver patch..."
        find . -name "platform_ps2.c" -exec sed -i 's/waitUntilDeviceIsReady(\([^)]*\))/waitUntilDeviceIsReady((char *)\1)/g' {} +

        # Verification
        echo "Verifying Patches:"
        find . -name "ps2_gfx.c" -not -path "./ps2_drivers/*" -exec grep "vsync_handler" {} +
        find . -name "platform_ps2.c" -exec grep "waitUntilDeviceIsReady" {} +
