name: CI

on:
  push:
    branches: 
      - '*'
    tags:
      - v*
  pull_request:
  repository_dispatch:
    types: [run_build]
  workflow_dispatch: {}

jobs:
  cores:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
        core_opts: [
          [libretro-prboom, prboom_libretro_ps2],
          [gambatte-libretro, gambatte_libretro_ps2],
          [mame2003-plus, mame2003_plus_libretro_ps2],
        ]
      fail-fast: false

    container: ${{ matrix.docker_owner }}/ps2dev:latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk add build-base git bash cmake

    - name: Compile custom ps2_driver
      run: |
        # Ensure toolchain is in path for driver compilation
        export PS2DEV=/usr/local/ps2dev
        export PS2SDK=$PS2DEV/ps2sdk
        export PATH=$PATH:$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PS2SDK/bin

        git clone --recurse-submodules https://github.com/fjtrujy/ps2_drivers.git
        cd ps2_drivers
        for dir in $(find . -maxdepth 2 -name Makefile); do
          make -C $(dirname $dir) install
        done

    - name: Prepare and Surgical Patch
      run: |
        chmod +x *.sh
        chmod +x cores/*.sh
        
        ./prepare_release.sh
        ./prepare_retroarch.sh
        
        # Patch RetroArch common graphics for modern PS2SDK compatibility
        find . -name "ps2_gfx.c" -not -path "./ps2_drivers/*" | while read -r file; do
          sed -i -E 's/int\s+vsync_handler\s*\((void)?\)/int vsync_handler(int cause)/g' "$file"
        done

    - name: Compile project
      run: |
        # 1. Setup the Environment (The RetroArch Makefile.ps2 way)
        export PS2DEV=/usr/local/ps2dev
        export PS2SDK=$PS2DEV/ps2sdk
        export PATH=$PATH:$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PS2SDK/bin
        
        # 2. Apply MAME-Specific Path Fixes
        CORE_DIR="cores/${{ matrix.core_opts[0] }}-libretro"
        
        if [ "${{ matrix.core_opts[0] }}" == "mame2003-plus" ]; then
          # Manually clone so we can edit the Makefile before the .sh script runs
          git clone --depth 1 https://github.com/libretro/mame2003-plus-libretro $CORE_DIR
          
          echo "Applying Surgical Fix to MAME Makefile for PS2 toolchain..."
          # Target the lines you shared to use absolute paths
          # We use '|' as sed delimiter to handle the slashes in the path
          sed -i 's|CC = ee-gcc|CC = /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-gcc|g' $CORE_DIR/Makefile
          sed -i 's|CXX = ee-g++|CXX = /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-g++|g' $CORE_DIR/Makefile
          sed -i 's|AR = ee-ar|AR = /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-ar|g' $CORE_DIR/Makefile
        fi

        # 3. Execution
        # We pass the platform and toolchain variables as direct arguments to override internal Makefile defaults
        ./cores/${{ matrix.core_opts[0] }}.sh \
          platform=ps2 \
          CC=ee-gcc \
          CXX=ee-g++ \
          AR=ee-ar \
          STRIP=ee-strip

        ./generate_retroarch.sh ${{ matrix.core_opts[0] }} ${{ matrix.core_opts[1] }}

    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: RA-${{ matrix.core_opts[0] }}-${{ steps.slug.outputs.sha8 }}
        path: RA/
