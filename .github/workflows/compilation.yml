name: CI

on:
  push:
    branches: 
      - '*'
    tags:
      - v*
  pull_request:
  repository_dispatch:
    types: [run_build]
  workflow_dispatch: {}

jobs:
  cores:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
        core_opts: [
          [libretro-prboom, prboom_libretro_ps2],
          [gambatte-libretro, gambatte_libretro_ps2],
        ]
      fail-fast: false

    container: ${{ matrix.docker_owner }}/ps2dev:latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk add build-base git bash cmake

    - name: Compile custom ps2_driver
      run: |
        git clone --recurse-submodules https://github.com/fjtrujy/ps2_drivers.git
        cd ps2_drivers
        for dir in $(find . -maxdepth 2 -name Makefile); do
          make -C $(dirname $dir) install
        done

    - name: Prepare and Patch Source
      run: |
        chmod +x *.sh
        chmod +x cores/*.sh
        
        # 1. Download/Extract the RetroArch source
        ./prepare_release.sh
        ./prepare_retroarch.sh
        
        # 2. Locate and Fix the GSkit API mismatch globally
        echo "Searching for ps2_gfx.c to apply GSkit patch..."
        # We search everywhere except the ps2_drivers folder we just built
        find . -name "ps2_gfx.c" -not -path "./ps2_drivers/*" | while read -r file; do
          echo "Found $file - Patching vsync_handler signature..."
          chmod 666 "$file"
          sed -i -E 's/vsync_handler\s*\([^)]*\)/vsync_handler(int cause)/g' "$file"
          # Confirm the fix in the logs
          grep "vsync_handler" "$file"
        done

    - name: Compile project
      run: |
        # Run the specific core build script
        ./cores/${{ matrix.core_opts[0] }}.sh
        ./generate_retroarch.sh ${{ matrix.core_opts[0] }} ${{ matrix.core_opts[1] }}

    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: RA-${{ matrix.core_opts[0] }}-${{ steps.slug.outputs.sha8 }}
        path: RA/

  libretro-salamander:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
    container: ${{ matrix.docker_owner }}/ps2dev:latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: apk add build-base git bash cmake
    - name: Compile custom ps2_driver
      run: |
        git clone https://github.com/fjtrujy/ps2_drivers.git
        cd ps2_drivers
        for dir in $(find . -maxdepth 2 -name Makefile); do
          make -C $(dirname $dir) install
        done
    - name: Compile project
      run: |
        chmod +x *.sh
        ./prepare_release.sh
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RA-salamander-${{ github.sha }}
        path: RA/

  libretro-info-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
    container: ${{ matrix.docker_owner }}/ps2dev:latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: apk add build-base git bash
    - name: Compile project
      run: |
        chmod +x *.sh
        ./prepare_release.sh
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RA-info-${{ github.sha }}
        path: RA/
