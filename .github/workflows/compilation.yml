name: CI

on:
  push:
    branches: 
      - '*'
    tags:
      - v*
  pull_request:
  repository_dispatch:
    types: [run_build]
  workflow_dispatch: {}

jobs:
  cores:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
        core_opts: [
          [libretro-prboom, prboom_libretro_ps2],
          [gambatte-libretro, gambatte_libretro_ps2],
          [mame2003-plus, mame2003_plus_libretro_ps2],
        ]
      fail-fast: false

    container: ${{ matrix.docker_owner }}/ps2dev:latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk add build-base git bash cmake

    - name: Compile custom ps2_driver
      run: |
        # Ensure toolchain is in path for driver compilation
        export PS2DEV=/usr/local/ps2dev
        export PS2SDK=$PS2DEV/ps2sdk
        export PATH=$PATH:$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PS2SDK/bin

        git clone --recurse-submodules https://github.com/fjtrujy/ps2_drivers.git
        cd ps2_drivers
        for dir in $(find . -maxdepth 2 -name Makefile); do
          make -C $(dirname $dir) install
        done

    - name: Prepare and Surgical Patch
      run: |
        chmod +x *.sh
        chmod +x cores/*.sh
        
        ./prepare_release.sh
        ./prepare_retroarch.sh
        
        # Patch RetroArch common graphics for modern PS2SDK compatibility
        find . -name "ps2_gfx.c" -not -path "./ps2_drivers/*" | while read -r file; do
          sed -i -E 's/int\s+vsync_handler\s*\((void)?\)/int vsync_handler(int cause)/g' "$file"
        done

    - name: Compile project
      run: |
        # (Keep your existing Symlinks and Environment exports here)
        export PS2DEV=/usr/local/ps2dev
        export PS2SDK=$PS2DEV/ps2sdk
        export PATH=$PATH:$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PS2SDK/bin

        CORE_DIR="cores/${{ matrix.core_opts[0] }}-libretro"
        
        if [ "${{ matrix.core_opts[0] }}" == "mame2003-plus" ]; then
          # ... (Keep your git clone and Makefile injections) ...

          echo "Patching src/config.c for UINT32 compatibility..."
          # Fix argument 2 of readint in config_read_ports
          sed -i 's/&saved_total/(UINT32 *)\&saved_total/g' $CORE_DIR/src/config.c
          
          # Fix argument 2 of readint in config_read_coin_and_ticket_counters
          sed -i 's/&coins\[i\]/(UINT32 *)\&coins[i]/g' $CORE_DIR/src/config.c
          sed -i 's/dispensed_tickets/(UINT32 *)dispensed_tickets/g' $CORE_DIR/src/config.c

          echo "Disabling strict-aliasing and pointer-type errors..."
          # Add -fno-strict-aliasing and suppress incompatible pointer errors to the Makefile
          # This helps with those 'cast increases required alignment' warnings in memory.h
          sed -i 's/PLATCFLAGS :=/PLATCFLAGS := -fno-strict-aliasing -Wno-error=incompatible-pointer-types /g' $CORE_DIR/Makefile
        fi

        # Execute build
        ./cores/${{ matrix.core_opts[0] }}.sh \
          platform=ps2 \
          CC=ee-gcc \
          CXX=ee-g++ \
          AR=ee-ar

    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: RA-${{ matrix.core_opts[0] }}-${{ steps.slug.outputs.sha8 }}
        path: RA/
