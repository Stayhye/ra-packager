name: CI

on:
  push:
    branches: 
      - '*'
    tags:
      - v*
  pull_request:
  repository_dispatch:
    types: [run_build]
  workflow_dispatch: {}

jobs:
  cores:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
        core_opts: [
          [libretro-prboom, prboom_libretro_ps2],
          [gambatte-libretro, gambatte_libretro_ps2],
          [mame2003-plus, mame2003_plus_libretro_ps2],
        ]
      fail-fast: false

    container: ${{ matrix.docker_owner }}/ps2dev:latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk add build-base git bash cmake

    - name: Compile custom ps2_driver
      run: |
        git clone --recurse-submodules https://github.com/fjtrujy/ps2_drivers.git
        cd ps2_drivers
        for dir in $(find . -maxdepth 2 -name Makefile); do
          make -C $(dirname $dir) install
        done

    - name: Prepare and Surgical Patch
      run: |
        chmod +x *.sh
        chmod +x cores/*.sh
        
        # 1. Run preparation scripts
        ./prepare_release.sh
        ./prepare_retroarch.sh
        
        # 2. Apply the patch only to the function DEFINITION
        echo "Applying surgical patch to ps2_gfx.c..."
        find . -name "ps2_gfx.c" -not -path "./ps2_drivers/*" | while read -r file; do
          sed -i -E 's/int\s+vsync_handler\s*\((void)?\)/int vsync_handler(int cause)/g' "$file"
        done

    - name: Compile project
      run: |
        # Global Symlink: Corrected path for ps2dev tools
        echo "Creating global symlinks for PS2 toolchain..."
        # We target /usr/local/ps2dev/bin where the ee- binaries are actually housed
        if [ -d /usr/local/ps2dev/bin ]; then
          for tool in /usr/local/ps2dev/bin/mips64r5900el-ps2-elf-*; do
            # Create short-name aliases (ee-gcc) in /usr/bin
            base=$(basename "$tool")
            alias_name=$(echo "$base" | sed 's/mips64r5900el-ps2-elf-/ee-/')
            ln -sf "$tool" "/usr/bin/$base"
            ln -sf "$tool" "/usr/bin/$alias_name"
          done
        fi
        
        # Verify the compiler is now visible to the shell
        ee-gcc --version
        
        # Execute the build
        ./cores/${{ matrix.core_opts[0] }}.sh
        ./generate_retroarch.sh ${{ matrix.core_opts[0] }} ${{ matrix.core_opts[1] }}

    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: RA-${{ matrix.core_opts[0] }}-${{ steps.slug.outputs.sha8 }}
        path: RA/
