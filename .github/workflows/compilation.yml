name: Build PS2 Cores

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    strategy:
      matrix:
        # core_opts[0] is the folder name, [1] is the internal core name
        core_opts: [
          [mame2003-plus, mame2003_plus],
          [picodrive, picodrive],
          [uae, uae]
        ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apk add --no-cache git make patch bash

      - name: Compile project
        run: |
          # 1. Global Toolchain Symlinks
          # Ensures 'ee-gcc' is found regardless of where the sub-scripts look
          ln -sf /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-gcc /usr/local/bin/ee-gcc
          ln -sf /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-g++ /usr/local/bin/ee-g++
          ln -sf /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-ar /usr/local/bin/ee-ar
          ln -sf /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-strip /usr/local/bin/ee-strip

          # 2. Setup General Environment
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PATH:$PS2DEV/bin:$PS2DEV/ee/bin:$PS2SDK/bin
          
          CORE_NAME="${{ matrix.core_opts[0] }}"
          CORE_DIR="cores/${CORE_NAME}-libretro"
          
          # 3. MAME-SPECIFIC FIXES
          # This block only executes for MAME to prevent breaking other cores
          if [ "$CORE_NAME" == "mame2003-plus" ]; then
            echo "Preparing MAME source..."
            if [ ! -d "$CORE_DIR" ]; then
              git clone --depth 1 https://github.com/libretro/mame2003-plus-libretro "$CORE_DIR"
            fi

            echo "Applying MAME surgical fixes for pointer types..."
            CONFIG_PATH=$(find "$CORE_DIR" -name "config.c")
            if [ -n "$CONFIG_PATH" ]; then
              # Align function definitions with the 'unsigned int' variables used in config.c
              sed -i 's/UINT32 \*num/unsigned int \*num/g' "$CONFIG_PATH"
              sed -i 's/UINT32 num/unsigned int num/g' "$CONFIG_PATH"
              sed -i 's/UINT32 i;/unsigned int i;/g' "$CONFIG_PATH"
            fi
            
            # The Safety Net: Downgrade pointer mismatches from Error to Warning
            # This allows the build to move past src/config.o
            sed -i 's/PLATCFLAGS :=/PLATCFLAGS := -fpermissive -fno-strict-aliasing -Wno-error=incompatible-pointer-types /g' "$CORE_DIR/Makefile"
            
            # Force toolchain into the Makefile header
            sed -i '1i CC = ee-gcc' "$CORE_DIR/Makefile"
            sed -i '1i CXX = ee-g++' "$CORE_DIR/Makefile"
            sed -i '1i AR = ee-ar' "$CORE_DIR/Makefile"
          fi

          # 4. UNIVERSAL EXECUTION
          # Works for all cores in the matrix
          chmod +x ./cores/${CORE_NAME}.sh
          platform=ps2 PLATFORM=ps2 CC=ee-gcc CXX=ee-g++ AR=ee-ar \
          ./cores/${CORE_NAME}.sh

      - name: Generate RetroArch Package
        run: |
          chmod +x ./generate_retroarch.sh
          ./generate_retroarch.sh ${{ matrix.core_opts[0] }} ${{ matrix.core_opts[1] }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.core_opts[0] }}-ps2
          path: |
            *.elf
            *.a
            retroarch/
