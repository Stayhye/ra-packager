name: CI

on:
  push:
    branches: 
      - '*'
    tags:
      - v*
  pull_request:
  repository_dispatch:
    types: [run_build]
  workflow_dispatch: {}

jobs:
  cores:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
        core_opts: [
          [libretro-prboom, prboom_libretro_ps2],
          [gambatte-libretro, gambatte_libretro_ps2],
          [mame2003-plus, mame2003_plus_libretro_ps2],
        ]
      fail-fast: false

    container: ${{ matrix.docker_owner }}/ps2dev:latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk add build-base git bash cmake

    - name: Compile custom ps2_driver
      run: |
        git clone --recurse-submodules https://github.com/fjtrujy/ps2_drivers.git
        cd ps2_drivers
        for dir in $(find . -maxdepth 2 -name Makefile); do
          make -C $(dirname $dir) install
        done

    - name: Prepare and Surgical Patch
      run: |
        chmod +x *.sh
        chmod +x cores/*.sh
        
        # 1. Run original preparation scripts
        ./prepare_release.sh
        ./prepare_retroarch.sh
        
        # 2. Patch RetroArch common graphics
        find . -name "ps2_gfx.c" -not -path "./ps2_drivers/*" | while read -r file; do
          sed -i -E 's/int\s+vsync_handler\s*\((void)?\)/int vsync_handler(int cause)/g' "$file"
        done

    - name: Compile project
      run: |
        # PRE-BUILD: Inject absolute paths into the core's Makefile
        # This targets the specific core being built in the matrix
        CORE_DIR="cores/${{ matrix.core_opts[0] }}-libretro"
        
        # We manually clone here so we can patch the file before the .sh script runs its own make
        if [ "${{ matrix.core_opts[0] }}" == "mame2003-plus" ]; then
          git clone --depth 1 https://github.com/libretro/mame2003-plus-libretro $CORE_DIR
          
          echo "Hardcoding toolchain paths into MAME Makefile..."
          # This replaces the 'ee-' prefix with the full absolute path to the ps2dev binaries
          sed -i 's/CROSS_COMPILE := ee-/CROSS_COMPILE := \/usr\/local\/ps2dev\/ee\/bin\/mips64r5900el-ps2-elf-/g' $CORE_DIR/Makefile
          sed -i 's/CC = ee-gcc/CC = \/usr\/local\/ps2dev\/ee\/bin\/mips64r5900el-ps2-elf-gcc/g' $CORE_DIR/Makefile
          sed -i 's/CXX = ee-g++/CXX = \/usr\/local\/ps2dev\/ee\/bin\/mips64r5900el-ps2-elf-g++/g' $CORE_DIR/Makefile
        fi

        # Run the original build script (it will now use our patched Makefile)
        ./cores/${{ matrix.core_opts[0] }}.sh
        ./generate_retroarch.sh ${{ matrix.core_opts[0] }} ${{ matrix.core_opts[1] }}

    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: RA-${{ matrix.core_opts[0] }}-${{ steps.slug.outputs.sha8 }}
        path: RA/
