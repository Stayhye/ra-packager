name: CI

on:
  push:
    branches: 
      - '*'
    tags:
      - v*
  pull_request:
  repository_dispatch:
    types: [run_build]
  workflow_dispatch: {}

jobs:
  cores:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
        core_opts: [
          [libretro-prboom, prboom_libretro_ps2],
          [gambatte-libretro, gambatte_libretro_ps2],
        ]
      fail-fast: false

    container: ${{ matrix.docker_owner }}/ps2dev:latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk add build-base git bash cmake

    - name: Compile custom ps2_driver
      run: |
        git clone --recurse-submodules https://github.com/fjtrujy/ps2_drivers.git
        cd ps2_drivers
        for dir in $(find . -maxdepth 2 -name Makefile); do
          make -C $(dirname $dir) install
        done

    - name: Nuclear Patch for GSkit API
      run: |
        echo "Searching for ps2_gfx source files..."
        # Find the file specifically and use a very aggressive replacement
        # This replaces EVERYTHING between the parentheses of vsync_handler with 'int cause'
        find . -type f -name "ps2_gfx.*" -exec sed -i 's/vsync_handler\s*([^)]*)/vsync_handler(int cause)/g' {} +
        
        # Also catch any possible typedefs or forward declarations in headers
        find . -type f -name "*.h" -exec sed -i 's/vsync_handler\s*([^)]*)/vsync_handler(int cause)/g' {} +

        echo "Verifying change at line 431 (approx):"
        find . -name "ps2_gfx.*" -exec grep -n "vsync_handler" {} +

    - name: Compile project
      run: |
        chmod +x *.sh
        chmod +x cores/*.sh
        ./prepare_release.sh
        ./prepare_retroarch.sh
        ./cores/${{ matrix.core_opts[0] }}.sh
        ./generate_retroarch.sh ${{ matrix.core_opts[0] }} ${{ matrix.core_opts[1] }}

    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: RA-${{ matrix.core_opts[0] }}-${{ steps.slug.outputs.sha8 }}
        path: RA/

  libretro-salamander:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
    container: ${{ matrix.docker_owner }}/ps2dev:latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: apk add build-base git bash cmake
    - name: Compile custom ps2_driver
      run: |
        git clone https://github.com/fjtrujy/ps2_drivers.git
        cd ps2_drivers
        for dir in $(find . -maxdepth 2 -name Makefile); do
          make -C $(dirname $dir) install
        done
    - name: Compile project
      run: |
        chmod +x *.sh
        ./prepare_release.sh
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RA-salamander-${{ github.sha }}
        path: RA/

  libretro-info-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
    container: ${{ matrix.docker_owner }}/ps2dev:latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: apk add build-base git bash
    - name: Compile project
      run: |
        chmod +x *.sh
        ./prepare_release.sh
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RA-info-${{ github.sha }}
        path: RA/
