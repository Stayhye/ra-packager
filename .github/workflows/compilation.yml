name: CI

on:
  push:
    branches: 
      - '*'
    tags:
      - v*
  pull_request:
  repository_dispatch:
    types: [run_build]
  workflow_dispatch: {}

jobs:
  cores:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
        core_opts: [
          [libretro-prboom, prboom_libretro_ps2],
          [gambatte-libretro, gambatte_libretro_ps2],
          [mame2003-plus, mame2003_plus_libretro_ps2],
        ]
      fail-fast: false

    container:
      image: ${{ matrix.docker_owner }}/ps2dev:latest
      # This ensures the container environment variables are strictly enforced
      env:
        PS2DEV: /usr/local/ps2dev
        PS2SDK: /usr/local/ps2dev/ps2sdk
        PATH: /usr/local/ps2dev/bin:/usr/local/ps2dev/ee/bin:/usr/local/ps2dev/iop/bin:/usr/local/ps2dev/dvp/bin:/usr/local/ps2dev/ps2sdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk add build-base git bash cmake

    - name: Compile custom ps2_driver
      run: |
        git clone --recurse-submodules https://github.com/fjtrujy/ps2_drivers.git
        cd ps2_drivers
        for dir in $(find . -maxdepth 2 -name Makefile); do
          make -C $(dirname $dir) install
        done

    - name: Prepare and Surgical Patch
      run: |
        chmod +x *.sh
        chmod +x cores/*.sh
        
        ./prepare_release.sh
        ./prepare_retroarch.sh
        
        find . -name "ps2_gfx.c" -not -path "./ps2_drivers/*" | while read -r file; do
          sed -i -E 's/int\s+vsync_handler\s*\((void)?\)/int vsync_handler(int cause)/g' "$file"
        done

    - name: Compile project
      run: |
        # Explicitly export tools for MAME's sub-shell makefiles
        export CROSS_COMPILE=mips64r5900el-ps2-elf-
        export CC=ee-gcc
        export CXX=ee-g++
        
        ./cores/${{ matrix.core_opts[0] }}.sh
        ./generate_retroarch.sh ${{ matrix.core_opts[0] }} ${{ matrix.core_opts[1] }}

    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: RA-${{ matrix.core_opts[0] }}-${{ steps.slug.outputs.sha8 }}
        path: RA/
