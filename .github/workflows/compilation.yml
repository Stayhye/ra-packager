name: CI

on:
  push:
    branches: 
      - '*'
    tags:
      - v*
  pull_request:
  repository_dispatch:
    types: [run_build]
  workflow_dispatch: {}

jobs:
  cores:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_owner: [ps2dev]
        core_opts: [
          [libretro-prboom, prboom_libretro_ps2],
          [gambatte-libretro, gambatte_libretro_ps2],
          [mame2003-plus, mame2003_plus_libretro_ps2],
        ]
      fail-fast: false

    container: ${{ matrix.docker_owner }}/ps2dev:latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk add build-base git bash cmake

    - name: Compile custom ps2_driver
      run: |
        # Ensure toolchain is in path for driver compilation
        export PS2DEV=/usr/local/ps2dev
        export PS2SDK=$PS2DEV/ps2sdk
        export PATH=$PATH:$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PS2SDK/bin

        git clone --recurse-submodules https://github.com/fjtrujy/ps2_drivers.git
        cd ps2_drivers
        for dir in $(find . -maxdepth 2 -name Makefile); do
          make -C $(dirname $dir) install
        done

    - name: Prepare and Surgical Patch
      run: |
        chmod +x *.sh
        chmod +x cores/*.sh
        
        ./prepare_release.sh
        ./prepare_retroarch.sh
        
        # Patch RetroArch common graphics for modern PS2SDK compatibility
        find . -name "ps2_gfx.c" -not -path "./ps2_drivers/*" | while read -r file; do
          sed -i -E 's/int\s+vsync_handler\s*\((void)?\)/int vsync_handler(int cause)/g' "$file"
        done

    - name: Compile project
      run: |
        # 1. Global Toolchain Symlinks (The "Nuclear" Option)
        # This makes ee-gcc available to EVERY shell, even if the script clones a new repo
        sudo ln -sf /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-gcc /usr/bin/ee-gcc
        sudo ln -sf /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-g++ /usr/bin/ee-g++
        sudo ln -sf /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-ar /usr/bin/ee-ar
        sudo ln -sf /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-strip /usr/bin/ee-strip

        # 2. Environment Setup
        export PS2DEV=/usr/local/ps2dev
        export PS2SDK=$PS2DEV/ps2sdk
        export PATH=$PS2DEV/bin:$PS2DEV/ee/bin:$PS2SDK/bin:$PATH
        
        CORE_DIR="cores/${{ matrix.core_opts[0] }}-libretro"
        
        # 3. Patching (Only if the folder exists)
        if [ "${{ matrix.core_opts[0] }}" == "mame2003-plus" ]; then
          # If the script hasn't cloned it yet, we do it now to patch it
          if [ ! -d "$CORE_DIR" ]; then
            git clone --depth 1 https://github.com/libretro/mame2003-plus-libretro $CORE_DIR
          fi
          
          # Patch the Makefile and config.c in place
          sed -i 's/PLATCFLAGS :=/PLATCFLAGS := -fno-strict-aliasing -Wno-error=incompatible-pointer-types /g' $CORE_DIR/Makefile
          CONFIG_FILE=$(find $CORE_DIR -name "config.c")
          if [ -f "$CONFIG_FILE" ]; then
            sed -i 's/&saved_total/(UINT32 *)\&saved_total/g' "$CONFIG_FILE"
            sed -i 's/&coins\[i\]/(UINT32 *)\&coins[i]/g' "$CONFIG_FILE"
            sed -i 's/dispensed_tickets/(UINT32 *)dispensed_tickets/g' "$CONFIG_FILE"
          fi
        fi

        # 4. Final Execution
        # We pass the paths directly into the environment of the script execution
        # This prevents the script from 'forgetting' where the compiler is.
        CC=/usr/bin/ee-gcc CXX=/usr/bin/ee-g++ PLATFORM=ps2 platform=ps2 \
        ./cores/${{ matrix.core_opts[0] }}.sh
        
        ./generate_retroarch.sh ${{ matrix.core_opts[0] }} ${{ matrix.core_opts[1] }}

    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: RA-${{ matrix.core_opts[0] }}-${{ steps.slug.outputs.sha8 }}
        path: RA/
